<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">

  <rect width="500" height="500" rx="115" fill="#FAFAFA"/>

  <!-- Branch lines -->
  <line x1="250" y1="365" x2="155" y2="262" stroke="#111111" stroke-width="6" stroke-opacity="0.30" stroke-linecap="round"/>
  <line x1="250" y1="365" x2="250" y2="230" stroke="#111111" stroke-width="6" stroke-opacity="0.30" stroke-linecap="round"/>
  <line x1="250" y1="365" x2="345" y2="262" stroke="#111111" stroke-width="6" stroke-opacity="0.30" stroke-linecap="round"/>

  <!-- Sub-branch lines left -->
  <line x1="155" y1="262" x2="108" y2="170" stroke="#111111" stroke-width="4.5" stroke-opacity="0.20" stroke-linecap="round"/>
  <line x1="155" y1="262" x2="192" y2="170" stroke="#111111" stroke-width="4.5" stroke-opacity="0.20" stroke-linecap="round"/>

  <!-- Sub-branch lines right -->
  <line x1="345" y1="262" x2="308" y2="170" stroke="#111111" stroke-width="4.5" stroke-opacity="0.20" stroke-linecap="round"/>
  <line x1="345" y1="262" x2="392" y2="170" stroke="#111111" stroke-width="4.5" stroke-opacity="0.20" stroke-linecap="round"/>

  <!-- Root node -->
  <circle cx="250" cy="365" r="28" fill="#111111"/>

  <!-- Level 1 nodes -->
  <circle cx="155" cy="262" r="20" fill="#111111" opacity="0.60"/>
  <circle cx="250" cy="230" r="20" fill="#111111" opacity="0.60"/>
  <circle cx="345" cy="262" r="20" fill="#111111" opacity="0.60"/>

  <!-- Leaf nodes -->
  <circle cx="108" cy="170" r="15" fill="#111111" opacity="0.28"/>
  <circle cx="192" cy="170" r="15" fill="#111111" opacity="0.28"/>
  <circle cx="250" cy="135" r="15" fill="#111111" opacity="0.28"/>
  <circle cx="308" cy="170" r="15" fill="#111111" opacity="0.28"/>
  <circle cx="392" cy="170" r="15" fill="#111111" opacity="0.28"/>

  <!-- Center node sub-branch -->
  <line x1="250" y1="230" x2="250" y2="150" stroke="#111111" stroke-width="4.5" stroke-opacity="0.20" stroke-linecap="round"/>

</svg>
